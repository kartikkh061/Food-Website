<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Food Website</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/auth.css">
    <link rel="stylesheet" href="assets/css/validation.css">
    <link rel="stylesheet" href="assets/css/accessibility.css">
</head>
<body>
    <a href="#main-content" class="skip-navigation">Skip to main content</a>
    
    <div class="gradient-bg" aria-hidden="true"></div>
    <main id="main-content" class="registration" role="main">
        <h1>Reset Password</h1>
        <div class="form">
            <form id="resetForm" aria-label="Reset password form">
                <div class="form-group">
                    <label for="resetEmail" class="sr-only">Email address</label>
                    <input type="email" id="resetEmail" name="resetEmail" placeholder="Enter your registered email" aria-required="true" aria-label="Enter your registered email address" autocomplete="email" required>
                </div>
                <div class="form-group">
                    <label for="newPassword" class="sr-only">New password</label>
                    <input type="password" id="newPassword" name="newPassword" placeholder="New Password" aria-required="true" aria-label="New password" aria-describedby="new-password-description" autocomplete="new-password" required>
                    <span id="new-password-description" class="sr-only">Password must be at least 6 characters long</span>
                </div>
                <div class="form-group">
                    <label for="confirmNewPassword" class="sr-only">Confirm new password</label>
                    <input type="password" id="confirmNewPassword" name="confirmNewPassword" placeholder="Confirm New Password" aria-required="true" aria-label="Confirm new password" aria-describedby="confirm-new-password-description" autocomplete="new-password" required>
                    <span id="confirm-new-password-description" class="sr-only">Re-enter your new password to confirm</span>
                </div>
                <input type="submit" class="button" value="Update Password" aria-label="Submit password reset form">
            </form>
            <span class="signup">Suddenly remembered? <a href="login.html" aria-label="Go back to login page">Login here</a></span>
        </div>
    </main>

    <script src="assets/js/auth-utils.js"></script>
    <script src="assets/js/validation.js"></script>
    <script src="assets/js/accessibility.js"></script>
    <script src="assets/js/forgot-password.js"></script>
</body>
</html>
